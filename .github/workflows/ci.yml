name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JVM tests (all platforms can run JVM) ─────────────────────────
  test-jvm:
    strategy:
      fail-fast: false
      matrix:
        jdk: [17, 21]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Run JVM tests
        run: ./gradlew :long128-core:jvmTest
      - name: Verify instructions (x86-64)
        run: ./verify-instructions.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-jvm-${{ matrix.jdk }}
          path: "**/build/reports/tests/"

  # ── Linux native ──────────────────────────────────────────────────
  test-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run linuxX64 tests
        run: ./gradlew :long128-core:linuxX64Test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-linux-x64
          path: "**/build/reports/tests/"

  # ── macOS (ARM64 + x64 via Rosetta) ──────────────────────────────
  test-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # ARM64 (M1)
            target: macosArm64Test
            needs-rosetta: false
          - os: macos-14       # x64 via Rosetta 2 (macos-13 was retired Dec 2025)
            target: macosX64Test
            needs-rosetta: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rosetta 2
        if: matrix.needs-rosetta
        run: softwareupdate --install-rosetta --agree-to-license
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run ${{ matrix.target }}
        run: ./gradlew :long128-core:${{ matrix.target }}

  # ── Windows (mingwX64) ────────────────────────────────────────────
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run mingwX64 tests
        run: ./gradlew :long128-core:mingwX64Test

  # ── Benchmark (Linux only, not a gate) ────────────────────────────
  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test-jvm, test-linux-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run C vs Kotlin benchmark
        run: ./benchmark/run-benchmarks.sh
